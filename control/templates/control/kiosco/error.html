<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error — Villa Heroica</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background: #1a2e4a; min-height: 100vh; margin: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card-e {
    background: #fff; border-radius: 20px;
    padding: 2.5rem 2rem; width: 100%; max-width: 420px; text-align: center;
  }
  .icono { font-size: 4rem; margin-bottom: 1rem; }
  h2 { color: #dc2626; font-size: 1.3rem; font-weight: 700; }
  p  { color: #374151; font-size: 1rem; }
  a  { display: block; margin-top: 1.5rem; padding: .9rem;
       background: #1a2e4a; color: #fff; border-radius: 10px;
       text-decoration: none; font-weight: 600; font-size: 1rem; }
  a:hover { background: #2c4a6e; color: #fff; }
</style>
</head>
<body>
<div class="card-e">
  <div class="icono">⚠️</div>
  <h2>No se pudo registrar</h2>
  <p>{{ mensaje }}</p>
  <a href="{% url 'kiosco' %}">← Volver al inicio</a>
</div>
<script>
  // Auto-redirigir en 8 segundos
  setTimeout(() => window.location.href = '{% url "kiosco" %}', 8000);
</script>
</body>
</html>
