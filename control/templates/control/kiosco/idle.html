<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegio Villa Heroica — Asistencia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  :root { --azul: #1a2e4a; --acento: #e8a020; }
  * { box-sizing: border-box; }
  body {
    background: var(--azul);
    min-height: 100vh; margin: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
  }
  .logo-box {
    width: 90px; height: 90px; background: var(--acento);
    border-radius: 20px; display: flex; align-items: center;
    justify-content: center; font-size: 2.5rem; margin: 0 auto 1.2rem;
  }
  .institucion { color: #fff; font-size: 1.4rem; font-weight: 700; text-align: center; }
  .reloj { font-size: 3.5rem; font-weight: 700; color: #fff;
           text-align: center; font-variant-numeric: tabular-nums;
           letter-spacing: 0.03em; margin: 0.5rem 0; }
  .fecha { color: rgba(255,255,255,.55); text-align: center;
           font-size: 1rem; margin-bottom: 2.5rem; }
  .btn-kiosco {
    display: block; width: 100%; padding: 1.3rem 2rem;
    font-size: 1.3rem; font-weight: 700; border-radius: 14px;
    border: none; cursor: pointer; transition: transform .1s, opacity .1s;
    text-decoration: none; text-align: center;
  }
  .btn-kiosco:active { transform: scale(.97); }
  .btn-entrada { background: #16a34a; color: #fff; margin-bottom: 1rem; }
  .btn-salida  { background: #dc2626; color: #fff; }
  .btn-entrada:hover { background: #15803d; color: #fff; }
  .btn-salida:hover  { background: #b91c1c; color: #fff; }
  .card-kiosco { background: rgba(255,255,255,.07); border-radius: 20px;
                 padding: 2.5rem 2rem; width: 100%; max-width: 440px; }
  .version { color: rgba(255,255,255,.25); font-size: .72rem;
             text-align: center; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="card-kiosco">
  <div class="logo-box">🏫</div>
  <div class="institucion">Colegio Villa Heroica</div>
  <div class="reloj" id="reloj">--:--</div>
  <div class="fecha" id="fecha"></div>
  <a href="{% url 'kiosco_cedula' %}?accion=entrada" class="btn-kiosco btn-entrada">
    <i class="bi bi-box-arrow-in-right me-2"></i>Registrar Entrada
  </a>
  <a href="{% url 'kiosco_cedula' %}?accion=salida" class="btn-kiosco btn-salida">
    <i class="bi bi-box-arrow-right me-2"></i>Registrar Salida
  </a>
  <div class="version">Sistema de Asistencia v2.0</div>
</div>

<script>
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function tick() {
  const d = new Date();
  const hm = [d.getHours(), d.getMinutes()].map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('reloj').textContent = hm;
  document.getElementById('fecha').textContent =
    `${DIAS[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
