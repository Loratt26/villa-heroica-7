<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar {{ accion|title }} — Villa Heroica</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  :root { --azul: #1a2e4a; --acento: #e8a020;
          --verde: #16a34a; --rojo: #dc2626; }
  body {
    background: var(--azul); min-height: 100vh; margin: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card-k {
    background: #fff; border-radius: 20px;
    padding: 2rem 1.8rem; width: 100%; max-width: 480px;
  }
  .titulo {
    font-size: 1.3rem; font-weight: 700; color: var(--azul);
    text-align: center; margin-bottom: 1.4rem;
  }
  #inp-cedula {
    font-size: 2rem; font-weight: 700; text-align: center;
    border: 3px solid #d1d5db; border-radius: 12px;
    padding: .6rem 1rem; width: 100%; outline: none;
    letter-spacing: .08em; color: var(--azul);
    transition: border-color .2s;
  }
  #inp-cedula:focus { border-color: var(--azul); }
  #inp-cedula.ok    { border-color: var(--verde); }
  #inp-cedula.error { border-color: var(--rojo); }

  /* Card empleado */
  #card-empleado {
    display: none; margin-top: 1.2rem;
    background: #f8fafc; border-radius: 14px;
    border: 2px solid #e2e8f0; padding: 1rem;
    animation: fadeIn .2s;
  }
  #card-empleado.visible { display: flex; align-items: center; gap: 1rem; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .avatar {
    width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
    object-fit: cover; background: var(--azul);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; font-weight: 700; color: #fff;
    overflow: hidden;
  }
  .emp-nombre { font-size: 1.25rem; font-weight: 700; color: var(--azul); }
  .emp-cargo  { font-size: .85rem; color: #718096; }
  .emp-status { font-size: .8rem; margin-top: .3rem; }

  /* Alerta novedad */
  #alerta-novedad {
    display: none; margin-top: 1rem; border-radius: 10px;
    padding: .85rem 1rem; font-size: .9rem; font-weight: 600;
  }
  #alerta-novedad.tardanza       { background: #fff3cd; color: #856404; border: 1.5px solid #ffc107; }
  #alerta-novedad.salida_ant     { background: #fee2e2; color: #991b1b; border: 1.5px solid #dc2626; }

  /* Motivo */
  #bloque-motivo    { display: none; margin-top: 1rem; }
  #bloque-autorizador { display: none; margin-top: .8rem; }
  textarea.motivo-inp {
    width: 100%; border-radius: 10px; border: 2px solid #d1d5db;
    padding: .7rem; font-size: 1rem; resize: none; min-height: 80px;
  }
  select.form-select { font-size: 1rem; }

  /* Botón confirmar */
  #btn-confirmar {
    display: none; width: 100%; margin-top: 1.2rem;
    padding: 1rem; font-size: 1.2rem; font-weight: 700;
    border: none; border-radius: 12px; cursor: pointer;
    transition: transform .1s;
  }
  #btn-confirmar:active { transform: scale(.97); }
  #btn-confirmar.entrada { background: var(--verde); color: #fff; }
  #btn-confirmar.salida  { background: var(--rojo);  color: #fff; }

  .btn-volver {
    display: block; text-align: center; margin-top: .8rem;
    color: #718096; font-size: .88rem; text-decoration: none;
  }
  .btn-volver:hover { color: var(--azul); }
  #msg-error { display: none; color: var(--rojo); font-size: .88rem;
               text-align: center; margin-top: .5rem; }
  #spinner   { display: none; text-align: center; margin-top: .5rem; color: #718096; }
</style>
</head>
<body>

<div class="card-k">
  <div class="titulo">
    {% if accion == 'entrada' %}
      <i class="bi bi-box-arrow-in-right me-2" style="color:#16a34a"></i>Registrar Entrada
    {% else %}
      <i class="bi bi-box-arrow-right me-2" style="color:#dc2626"></i>Registrar Salida
    {% endif %}
  </div>

  <input id="inp-cedula" type="text" inputmode="numeric"
         autocomplete="off" autocorrect="off" spellcheck="false"
         maxlength="12" placeholder="V-________" value="V-">

  <div id="spinner"><i class="bi bi-hourglass-split"></i> Buscando...</div>
  <div id="msg-error"></div>

  <!-- Card empleado encontrado -->
  <div id="card-empleado">
    <div class="avatar" id="avatar-box">
      <img id="foto-emp" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;">
      <span id="iniciales-emp"></span>
    </div>
    <div>
      <div class="emp-nombre" id="nombre-emp"></div>
      <div class="emp-cargo"  id="cargo-emp"></div>
      <div class="emp-status" id="status-emp"></div>
    </div>
  </div>

  <!-- Alerta tardanza / salida anticipada -->
  <div id="alerta-novedad"></div>

  <!-- Motivo -->
  <div id="bloque-motivo">
    <label style="font-size:.88rem;font-weight:600;color:#374151;">Motivo:</label>
    <textarea id="inp-motivo" class="motivo-inp"
              placeholder="Describe brevemente el motivo..."></textarea>
  </div>

  <!-- Autorizador -->
  <div id="bloque-autorizador">
    <label style="font-size:.88rem;font-weight:600;color:#374151;">Autorizado por:</label>
    <select id="sel-autorizador" class="form-select mt-1">
      <option value="">— Selecciona autorizador —</option>
    </select>
  </div>

  <!-- Formulario oculto -->
  <form id="form-marcaje" method="post" action="{% url 'kiosco_marcar' %}">
    {% csrf_token %}
    <input type="hidden" name="accion"           value="{{ accion }}">
    <input type="hidden" name="empleado_id"       id="hid-empleado-id">
    <input type="hidden" name="motivo"            id="hid-motivo">
    <input type="hidden" name="autorizado_por_id" id="hid-autorizador">
    <button id="btn-confirmar" type="submit" class="{{ accion }}">
      {% if accion == 'entrada' %}
        <i class="bi bi-check-circle me-2"></i>Confirmar Entrada
      {% else %}
        <i class="bi bi-check-circle me-2"></i>Confirmar Salida
      {% endif %}
    </button>
  </form>

  <a href="{% url 'kiosco' %}" class="btn-volver">← Volver</a>
</div>

<script>
const ACCION    = '{{ accion }}';
const API_URL   = '{% url "api_buscar_cedula" %}';
const IDLE_SEG  = {{ idle_segundos|default:30 }};

const inp       = document.getElementById('inp-cedula');
const cardEmp   = document.getElementById('card-empleado');
const alertaNov = document.getElementById('alerta-novedad');
const bloqMotiv = document.getElementById('bloque-motivo');
const bloqAut   = document.getElementById('bloque-autorizador');
const btnConf   = document.getElementById('btn-confirmar');
const msgError  = document.getElementById('msg-error');
const spinner   = document.getElementById('spinner');
const form      = document.getElementById('form-marcaje');

let empleadoData   = null;
let autofillOk     = false;
let abortController = null;
let idleTimer;

// ── Foco permanente ──────────────────────────────────────────────────────────
inp.focus();
document.addEventListener('click', e => { if (e.target !== inp) inp.focus(); });
inp.addEventListener('blur', () => setTimeout(() => inp.focus(), 80));

// ── Idle timeout ─────────────────────────────────────────────────────────────
function resetIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => window.location.href = '{% url "kiosco" %}', IDLE_SEG * 1000);
}
['keydown','click','touchstart','input'].forEach(e =>
  document.addEventListener(e, resetIdle, { passive: true })
);
resetIdle();

// ── Prefijo V- ───────────────────────────────────────────────────────────────
inp.addEventListener('keydown', function(e) {
  // No dejar borrar el prefijo "V-"
  const prefijo = this.value.startsWith('E-') ? 'E-' : 'V-';
  if ((e.key === 'Backspace' || e.key === 'Delete') && this.value.length <= prefijo.length) {
    e.preventDefault();
  }
});

inp.addEventListener('input', function() {
  let v = this.value.toUpperCase();
  // Asegurar prefijo
  if (!v.startsWith('V-') && !v.startsWith('E-')) {
    v = 'V-' + v.replace(/^[VE]-?/, '');
    this.value = v;
  }
  limpiarEstado();
  if (v.length >= 9) buscarCedula(v);  // mínimo V-xxxxxx
});

// ── Autofill ─────────────────────────────────────────────────────────────────
let debounce;
function buscarCedula(cedula) {
  clearTimeout(debounce);
  debounce = setTimeout(async () => {
    if (abortController) abortController.abort();
    abortController = new AbortController();
    spinner.style.display = 'block';
    try {
      const res  = await fetch(`${API_URL}?q=${encodeURIComponent(cedula)}`,
                               { signal: abortController.signal });
      const data = await res.json();
      spinner.style.display = 'none';
      renderEmpleado(data);
    } catch(e) {
      spinner.style.display = 'none';
      if (e.name !== 'AbortError') mostrarError('Error de conexión. Intenta de nuevo.');
    }
  }, 280);
}

function renderEmpleado(data) {
  if (!data.encontrado) {
    const msgs = {
      'no_registrado':  'Cédula no registrada. Contacta a administración.',
      'inactivo':       'Tu cuenta está inactiva. Contacta a administración.',
      'formato_invalido': 'Formato de cédula inválido.',
    };
    mostrarError(msgs[data.error] || 'No encontrado.');
    inp.classList.add('error');
    return;
  }

  empleadoData = data;
  inp.classList.add('ok');

  // Card empleado
  document.getElementById('nombre-emp').textContent = `${data.nombre} ${data.apellido}`;
  document.getElementById('cargo-emp').textContent  = `${data.cargo} · ${data.departamento}`;

  const foto     = document.getElementById('foto-emp');
  const iniciales = document.getElementById('iniciales-emp');
  if (data.foto_url) {
    foto.src = data.foto_url; foto.style.display = 'block';
    iniciales.style.display = 'none';
  } else {
    foto.style.display = 'none';
    iniciales.textContent  = (data.nombre[0] + data.apellido[0]).toUpperCase();
    iniciales.style.display = 'block';
  }

  // Estado del día
  const statusEl = document.getElementById('status-emp');
  if (ACCION === 'entrada' && data.tiene_entrada) {
    statusEl.innerHTML = `<span style="color:#16a34a">✅ Entrada: ${data.hora_entrada_hoy}</span>`;
  } else if (ACCION === 'salida' && data.tiene_salida) {
    statusEl.innerHTML = `<span style="color:#dc2626">⚠️ Ya registraste salida hoy.</span>`;
  } else {
    statusEl.textContent = '';
  }

  cardEmp.classList.add('visible');

  // Evaluar novedad
  const eval_ = ACCION === 'entrada' ? data.evaluacion_entrada : data.evaluacion_salida;

  if (eval_.estado !== 'normal' && eval_.mensaje) {
    alertaNov.textContent = `⚠️ ${eval_.mensaje}`;
    alertaNov.className   = ACCION === 'entrada' ? 'tardanza' : 'salida_ant';
    alertaNov.style.display = 'block';
    bloqMotiv.style.display = 'block';

    if (eval_.requiere_autorizacion && eval_.autorizadores) {
      const sel = document.getElementById('sel-autorizador');
      sel.innerHTML = '<option value="">— Selecciona autorizador —</option>';
      eval_.autorizadores.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = `${a.nombre} ${a.apellido}`;
        sel.appendChild(opt);
      });
      bloqAut.style.display = 'block';
    }
  }

  btnConf.style.display = 'block';
  autofillOk = true;
}

// ── Submit ────────────────────────────────────────────────────────────────────
form.addEventListener('submit', function(e) {
  e.preventDefault();
  if (!autofillOk || !empleadoData) return;

  const motivo = document.getElementById('inp-motivo').value.trim();
  const autId  = document.getElementById('sel-autorizador').value;
  const eval_  = ACCION === 'entrada' ? empleadoData.evaluacion_entrada : empleadoData.evaluacion_salida;

  if (eval_.requiere_motivo && !motivo) {
    document.getElementById('inp-motivo').style.borderColor = '#dc2626';
    document.getElementById('inp-motivo').focus();
    return;
  }
  if (eval_.requiere_autorizacion && !autId) {
    document.getElementById('sel-autorizador').style.borderColor = '#dc2626';
    return;
  }

  document.getElementById('hid-empleado-id').value = empleadoData.id;
  document.getElementById('hid-motivo').value      = motivo;
  document.getElementById('hid-autorizador').value = autId;

  // Deshabilitar todo durante submit para evitar doble envío
  btnConf.disabled = true;
  btnConf.textContent = 'Registrando...';
  form.submit();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function limpiarEstado() {
  empleadoData = null; autofillOk = false;
  cardEmp.classList.remove('visible');
  alertaNov.style.display = 'none';
  bloqMotiv.style.display = 'none';
  bloqAut.style.display   = 'none';
  btnConf.style.display   = 'none';
  msgError.style.display  = 'none';
  inp.className = '';
}

function mostrarError(msg) {
  msgError.textContent    = msg;
  msgError.style.display  = 'block';
}
</script>
</body>
</html>
