<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Colegio Villa Heroica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-oscuro: #1a2e4a;
            --azul-medio: #2c4a6e;
            --acento: #e8a020;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul-medio) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-logo {
            width: 64px; height: 64px;
            background: var(--acento);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
        }

        .login-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--azul-oscuro);
            text-align: center;
        }

        .login-sub {
            font-size: 0.82rem;
            color: #718096;
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .form-control:focus {
            border-color: var(--azul-medio);
            box-shadow: 0 0 0 0.2rem rgba(44,74,110,0.2);
        }

        .btn-login {
            background: var(--azul-oscuro);
            border: none;
            color: #fff;
            width: 100%;
            padding: 0.7rem;
            font-weight: 600;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: var(--azul-medio);
            color: #fff;
        }

        .footer-login {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div>
        <div class="login-card">
            <div class="login-logo">🏫</div>
            <div class="login-title">Colegio Villa Heroica</div>
            <div class="login-sub">Sistema de Control de Asistencia<br>Guatire, Venezuela</div>

            {% if form.errors %}
            <div class="alert alert-danger py-2 mb-3" style="font-size:0.85rem;">
                <i class="bi bi-exclamation-triangle me-1"></i>
                Usuario o contraseña incorrectos. Intente nuevamente.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:0.85rem;">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" autofocus required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold" style="font-size:0.85rem;">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                </button>
            </form>
        </div>
        <div class="footer-login">Sistema de Asistencia v1.0 &bull; Pasantía 2024</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
