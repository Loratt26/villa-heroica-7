{% extends 'control/base.html' %}
{% block title %}Editar Registro{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-pencil-square me-2" style="color:#2c4a6e;"></i>Editar Registro</h1>
    <p>{{ registro.empleado }} — {{ registro.fecha|date:"d/m/Y" }}</p>
</div>
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card-form">
            <div class="mb-3 p-3 rounded" style="background:#fff3cd;border:1px solid #ffc107;font-size:.85rem;">
                <i class="bi bi-exclamation-triangle me-1"></i>
                Esta acción queda registrada en el log de auditoría.
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:.85rem;">Hora de Entrada</label>
                    <input type="time" name="hora_entrada" class="form-control"
                           value="{% if registro.hora_entrada %}{{ registro.hora_entrada|time:'H:i' }}{% endif %}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:.85rem;">Hora de Salida</label>
                    <input type="time" name="hora_salida" class="form-control"
                           value="{% if registro.hora_salida %}{{ registro.hora_salida|time:'H:i' }}{% endif %}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:.85rem;">Tipo de Novedad</label>
                    <select name="tipo_novedad" class="form-select">
                        {% for val, label in novedades %}
                        <option value="{{ val }}" {% if registro.tipo_novedad == val %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold" style="font-size:.85rem;">Motivo / Observación</label>
                    <textarea name="motivo" class="form-control" rows="3"
                              style="resize:none;">{{ registro.motivo }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn fw-semibold"
                            style="background:#1a2e4a;color:#fff;border-radius:8px;padding:.6rem 1.5rem;">
                        <i class="bi bi-check-lg me-1"></i>Guardar
                    </button>
                    <a href="{% url 'admin_lista_registros' %}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
